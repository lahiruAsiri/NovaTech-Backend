name: Order Service CI/CD

on:
  push:
    paths:
      - 'order-service/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: order-service
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20'
          
      - run: npm install
      - run: npx prisma generate
      - name: Push Prisma Schema to Azure SQL
        run: npx prisma db push
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_ORDER }}
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
          
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./order-service
          push: true
          tags: lahiruasiri2/novatech-order-service:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME_ORDER }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_ORDER }}
          images: lahiruasiri2/novatech-order-service:latest
