name: Order Service CI/CD

on:
  push:
    paths:
      - 'order-service/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: order-service
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20'
          
      - run: npm install
      - run: npx prisma generate
      - run: npm run build
      
      # Mock Snyk
      - name: Run Snyk vulnerability check
        run: echo "Snyk ran successfully."
        
      # Mock SonarCloud
      - name: Run SonarCloud validation
        run: echo "SonarCloud ran successfully."

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME_ORDER }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_ORDER }}
          package: order-service
